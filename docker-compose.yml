services:
  db:
    image: postgres:16
    container_name: service-booking-db
    environment:
      POSTGRES_DB: service_booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Cqs030104
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d service_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/service-booking
    container_name: service-booking-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/service_booking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Cqs030104
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: service-booking-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
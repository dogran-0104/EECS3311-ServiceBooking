<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Browse Services</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        button { padding: 10px 14px; }
        .muted { color:#666; }
        .box { border:1px solid #ddd; border-radius:8px; padding:12px; margin-top:16px; }
        pre { background:#f7f7f7; padding:12px; border-radius:8px; overflow:auto; }
    </style>
</head>
<body>
<h1>Browse Services</h1>
<p class="muted">Endpoint: <code>/api/services</code></p>

<div class="box">
    <button id="btnLoad">Load services</button>
    <div id="msg" class="muted" style="margin-top:10px;"></div>
    <pre id="out">Click "Load services" to fetch data...</pre>
</div>

<div class="box">
    <p class="muted">Quick links:</p>
    <ul>
        <li><a href="/booking.html">Go to booking page</a></li>
        <li><a href="/api/services" target="_blank">Open /api/services JSON</a></li>
    </ul>
</div>

<script>
    const API_BASE = "/api";
    const out = document.getElementById("out");
    const msg = document.getElementById("msg");

    async function loadServices() {
        msg.textContent = "Loading...";
        out.textContent = "";

        try {
            const res = await fetch(`${API_BASE}/services`);

            if (!res.ok) {
                msg.textContent = `Failed: HTTP ${res.status}`;
                out.textContent = await res.text();
                return;
            }

            const data = await res.json();
            msg.textContent = `Loaded ${Array.isArray(data) ? data.length : 0} services.`;
            out.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
            msg.textContent = "Failed: " + e;
        }
    }

    document.getElementById("btnLoad").onclick = loadServices;
</script>
</body>
</html>

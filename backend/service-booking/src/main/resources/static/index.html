<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Service Booking - Browse Services</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin: 10px 0; }
        .muted { color: #666; }
    </style>
</head>
<body>
<h1>Browse Services</h1>
<p class="muted">Endpoint: <code>/services</code></p>

<button id="btnLoad">Load services</button>
<div id="list"></div>

<script>
    const listDiv = document.getElementById("list");
    const btn = document.getElementById("btnLoad");

    function render(services) {
        listDiv.innerHTML = "";
        services.forEach(s => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
          <b>${s.name}</b><br/>
          Duration: ${s.durationMinutes} minutes<br/>
          Price: $${s.price}<br/>
          <span class="muted">ID: ${s.id}</span>
        `;
            listDiv.appendChild(card);
        });
    }

    btn.addEventListener("click", async () => {
        listDiv.innerHTML = "Loading...";
        try {
            const res = await fetch("/services");
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            render(data);
        } catch (e) {
            listDiv.innerHTML = "Failed: " + e.message;
        }
    });
</script>
</body>
</html>
